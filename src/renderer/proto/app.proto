syntax = "proto3";

import "google/protobuf/empty.proto";

message SetAlwaysOnTopRequest {
  bool always_on_top = 1;
}

// Which top-level view is currently on screen in the single window. Main uses
// this, combined with window visibility, to activate exactly the one service
// whose view is visible: metrics sampling for Stats, process collection for
// Processes. UNKNOWN is the proto3 default and activates neither.
enum ActiveView {
  ACTIVE_VIEW_UNKNOWN = 0;
  ACTIVE_VIEW_STATS = 1;
  ACTIVE_VIEW_PROCESSES = 2;
}

message SetActiveViewRequest {
  ActiveView view = 1;
}

// Writes user-selected text to the system clipboard. The renderer is sandboxed
// and cannot reach the clipboard directly, so a manual copy (an executable path
// or a process command line) is forwarded here and main performs the privileged
// clipboard write. It is a generic, user-initiated copy: the text may be a
// sensitive command line, so main must never log, persist, or echo it - writing
// it to the user's own clipboard on request is the only permitted handling.
message CopyTextRequest {
  string text = 1;
}

// App-level renderer-to-main commands.
service AppService {
  rpc SetAlwaysOnTop(SetAlwaysOnTopRequest) returns (google.protobuf.Empty);

  // Reports the selected top-level view so main can gate per-view background
  // work: only the visible view's service runs, and nothing runs while the
  // window is hidden.
  rpc SetActiveView(SetActiveViewRequest) returns (google.protobuf.Empty);

  // Writes renderer-supplied text to the system clipboard (a user-initiated
  // copy). Main performs the privileged write because the renderer is
  // sandboxed; the text is never logged or persisted (see CopyTextRequest).
  rpc CopyText(CopyTextRequest) returns (google.protobuf.Empty);
}
